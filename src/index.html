<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' file: data:; font-src 'self' data:;">
  <title>Pumice</title>
  <link rel="stylesheet" href="renderer.css">
</head>
<body>
  <div id="app">
    <!-- Top bar: tabs + controls -->
    <div id="top-bar">
      <div id="pane-container-tabs">
        <div class="pane-tabs" data-pane="left">
          <div class="tab-list" id="tab-list-left"></div>
        </div>
        <div class="pane-tabs hidden" data-pane="right">
          <div class="tab-list" id="tab-list-right"></div>
        </div>
      </div>
      <div id="top-controls">
        <button id="btn-back" title="Back (Alt+Left)" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 3L5 8l5 5"/>
          </svg>
        </button>
        <button id="btn-forward" title="Forward (Alt+Right)" disabled>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 3l5 5-5 5"/>
          </svg>
        </button>
        <div class="top-controls-separator"></div>
        <button id="btn-new-file" title="New file (Ctrl+N)">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 1v14M1 8h14" stroke="currentColor" stroke-width="2" fill="none"/>
          </svg>
        </button>
        <button id="btn-split" title="Toggle split pane">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="1" y="1" width="14" height="14" rx="2"/>
            <line x1="8" y1="1" x2="8" y2="15"/>
          </svg>
        </button>
        <button id="btn-mode" title="Toggle edit mode (Ctrl+E)">
          <!-- Book icon (read mode) — shown when in read mode, click to enter edit -->
          <svg id="icon-read" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 2.5c1.5-1 3.5-1 6 0v11c-2.5-1-4.5-1-6 0V2.5z"/>
            <path d="M14 2.5c-1.5-1-3.5-1-6 0v11c2.5-1 4.5-1 6 0V2.5z"/>
          </svg>
          <!-- Pencil icon (edit mode) — shown when in edit mode, click to go back to read -->
          <svg id="icon-edit" class="hidden" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11.5 1.5l3 3L5 14H2v-3L11.5 1.5z"/>
            <path d="M9.5 3.5l3 3"/>
          </svg>
        </button>
        <button id="btn-theme" title="Toggle theme">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" id="theme-icon">
            <path d="M8 1a7 7 0 100 14A7 7 0 008 1zm0 12.5V2.5a5.5 5.5 0 010 11z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Main content area -->
    <div id="main-content">
      <div class="pane" id="pane-left">
        <!-- Search bar (Ctrl+F) -->
        <div class="search-bar hidden" id="search-bar-left">
          <input type="text" placeholder="Find in document..." class="search-input">
          <span class="search-count"></span>
          <button class="search-prev" title="Previous">▲</button>
          <button class="search-next" title="Next">▼</button>
          <button class="search-close" title="Close">✕</button>
        </div>
        <div class="pane-content">
          <div class="markdown-body" id="markdown-left"></div>
          <div class="editor-container hidden" id="editor-left"></div>
        </div>
        <div class="pane-footer">
          <div class="backlinks-panel collapsed" id="backlinks-left">
            <div class="backlinks-header">
              <span class="backlinks-toggle">▸</span>
              <span class="backlinks-title">Backlinks (0)</span>
            </div>
            <div class="backlinks-list"></div>
          </div>
        </div>
      </div>

      <div class="pane-divider hidden" id="pane-divider"></div>

      <div class="pane hidden" id="pane-right">
        <div class="search-bar hidden" id="search-bar-right">
          <input type="text" placeholder="Find in document..." class="search-input">
          <span class="search-count"></span>
          <button class="search-prev" title="Previous">▲</button>
          <button class="search-next" title="Next">▼</button>
          <button class="search-close" title="Close">✕</button>
        </div>
        <div class="pane-content">
          <div class="markdown-body" id="markdown-right"></div>
          <div class="editor-container hidden" id="editor-right"></div>
        </div>
        <div class="pane-footer">
          <div class="backlinks-panel collapsed" id="backlinks-right">
            <div class="backlinks-header">
              <span class="backlinks-toggle">▸</span>
              <span class="backlinks-title">Backlinks (0)</span>
            </div>
            <div class="backlinks-list"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Fuzzy search overlay (Ctrl+P) -->
    <div id="fuzzy-overlay" class="hidden">
      <div id="fuzzy-dialog">
        <input type="text" id="fuzzy-input" placeholder="Search files..." autocomplete="off">
        <div id="fuzzy-results"></div>
      </div>
    </div>

    <!-- New file dialog -->
    <div id="new-file-overlay" class="hidden">
      <div id="new-file-dialog">
        <label for="new-file-input">New file path (relative to root):</label>
        <input type="text" id="new-file-input" placeholder="path/to/new-note.md" autocomplete="off">
        <div id="new-file-actions">
          <button id="new-file-cancel">Cancel</button>
          <button id="new-file-create">Create</button>
        </div>
      </div>
    </div>

    <!-- Link context menu -->
    <div id="link-context-menu" class="hidden">
      <div class="context-menu-item" id="ctx-open-tab">Open in new tab</div>
      <div class="context-menu-item" id="ctx-open-split">Open in split pane</div>
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="hidden">
      <div class="empty-content">
        <h1>Pumice</h1>
        <p>Open a file with <kbd>Ctrl+P</kbd> or create one with <kbd>Ctrl+N</kbd></p>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
